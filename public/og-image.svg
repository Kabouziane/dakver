<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#14532d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <radialGradient id="glow1" cx="18%" cy="65%" r="45%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="82%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative rings (right side) -->
  <circle cx="970" cy="300" r="310" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.12"/>
  <circle cx="970" cy="300" r="240" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.10"/>
  <circle cx="970" cy="300" r="170" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.08"/>
  <circle cx="970" cy="300" r="100" fill="#16a34a" opacity="0.10"/>

  <!-- ============================= -->
  <!--  BUILDING + GREEN ROOF (right) -->
  <!-- ============================= -->

  <!-- Building body -->
  <rect x="710" y="225" width="360" height="280" rx="10" fill="#0d3320" opacity="0.85" filter="url(#shadow)"/>

  <!-- Windows row 1 -->
  <rect x="735" y="250" width="64" height="52" rx="7" fill="#22c55e" opacity="0.22"/>
  <rect x="815" y="250" width="64" height="52" rx="7" fill="#22c55e" opacity="0.22"/>
  <rect x="895" y="250" width="64" height="52" rx="7" fill="#22c55e" opacity="0.22"/>
  <rect x="975" y="250" width="64" height="52" rx="7" fill="#22c55e" opacity="0.22"/>
  <!-- Window glare -->
  <rect x="737" y="252" width="28" height="16" rx="4" fill="white" opacity="0.08"/>
  <rect x="817" y="252" width="28" height="16" rx="4" fill="white" opacity="0.08"/>
  <rect x="897" y="252" width="28" height="16" rx="4" fill="white" opacity="0.08"/>
  <rect x="977" y="252" width="28" height="16" rx="4" fill="white" opacity="0.08"/>

  <!-- Windows row 2 -->
  <rect x="735" y="322" width="64" height="52" rx="7" fill="#22c55e" opacity="0.22"/>
  <rect x="815" y="322" width="64" height="52" rx="7" fill="#22c55e" opacity="0.22"/>
  <rect x="895" y="322" width="64" height="52" rx="7" fill="#22c55e" opacity="0.22"/>
  <rect x="975" y="322" width="64" height="52" rx="7" fill="#22c55e" opacity="0.22"/>

  <!-- Door -->
  <rect x="860" y="415" width="60" height="90" rx="6" fill="#22c55e" opacity="0.18"/>
  <rect x="862" y="417" width="24" height="40" rx="4" fill="white" opacity="0.07"/>

  <!-- Green roof platform -->
  <rect x="695" y="188" width="390" height="48" rx="12" fill="#15803d"/>
  <rect x="695" y="188" width="390" height="14" rx="12" fill="#166534"/>

  <!-- Substrate layer line -->
  <rect x="695" y="226" width="390" height="6" rx="0" fill="#0d3320" opacity="0.5"/>

  <!-- Plants on roof -->
  <!-- Group 1 – big lush plant -->
  <ellipse cx="745" cy="183" rx="26" ry="30" fill="#16a34a"/>
  <ellipse cx="745" cy="183" rx="17" ry="21" fill="#22c55e"/>
  <ellipse cx="745" cy="183" rx="9"  ry="12" fill="#4ade80"/>

  <!-- Group 2 -->
  <ellipse cx="800" cy="178" rx="20" ry="24" fill="#15803d"/>
  <ellipse cx="800" cy="178" rx="13" ry="17" fill="#16a34a"/>
  <ellipse cx="800" cy="178" rx="7"  ry="10" fill="#4ade80"/>

  <!-- Group 3 – tallest -->
  <ellipse cx="852" cy="172" rx="28" ry="34" fill="#14532d"/>
  <ellipse cx="852" cy="172" rx="19" ry="24" fill="#15803d"/>
  <ellipse cx="852" cy="172" rx="11" ry="15" fill="#22c55e"/>
  <ellipse cx="852" cy="172" rx="5"  ry="8"  fill="#4ade80"/>

  <!-- Group 4 -->
  <ellipse cx="906" cy="180" rx="22" ry="26" fill="#16a34a"/>
  <ellipse cx="906" cy="180" rx="14" ry="18" fill="#22c55e"/>
  <ellipse cx="906" cy="180" rx="6"  ry="9"  fill="#86efac"/>

  <!-- Group 5 -->
  <ellipse cx="956" cy="176" rx="24" ry="28" fill="#15803d"/>
  <ellipse cx="956" cy="176" rx="16" ry="20" fill="#16a34a"/>
  <ellipse cx="956" cy="176" rx="8"  ry="11" fill="#4ade80"/>

  <!-- Group 6 -->
  <ellipse cx="1008" cy="183" rx="18" ry="22" fill="#16a34a"/>
  <ellipse cx="1008" cy="183" rx="11" ry="15" fill="#22c55e"/>

  <!-- Group 7 (edge) -->
  <ellipse cx="1055" cy="187" rx="20" ry="24" fill="#14532d"/>
  <ellipse cx="1055" cy="187" rx="12" ry="16" fill="#15803d"/>
  <ellipse cx="1055" cy="187" rx="6"  ry="9"  fill="#4ade80"/>

  <!-- Small sedums / ground cover -->
  <ellipse cx="762" cy="209" rx="12" ry="8" fill="#22c55e" opacity="0.7"/>
  <ellipse cx="830" cy="211" rx="10" ry="6" fill="#4ade80" opacity="0.6"/>
  <ellipse cx="880" cy="208" rx="14" ry="9" fill="#16a34a" opacity="0.7"/>
  <ellipse cx="930" cy="210" rx="11" ry="7" fill="#22c55e" opacity="0.6"/>
  <ellipse cx="990" cy="209" rx="12" ry="8" fill="#4ade80" opacity="0.5"/>
  <ellipse cx="1040" cy="211" rx="9"  ry="6" fill="#22c55e" opacity="0.6"/>

  <!-- Sun -->
  <circle cx="1120" cy="88" r="42" fill="#fbbf24" opacity="0.80"/>
  <circle cx="1120" cy="88" r="56" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.30"/>
  <circle cx="1120" cy="88" r="70" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.18"/>

  <!-- Evaporation arrows (from plants to sun) -->
  <path d="M830 155 C825 130 845 115 840 95" stroke="#86efac" stroke-width="2.5" fill="none" stroke-dasharray="5,5" opacity="0.55"/>
  <path d="M950 148 C955 122 975 108 970 88" stroke="#86efac" stroke-width="2.5" fill="none" stroke-dasharray="5,5" opacity="0.45"/>
  <path d="M1040 168 C1048 142 1068 125 1062 105" stroke="#86efac" stroke-width="2.5" fill="none" stroke-dasharray="5,5" opacity="0.40"/>

  <!-- ============================= -->
  <!--  LEFT — BRANDING CONTENT     -->
  <!-- ============================= -->

  <!-- Logo rounded square -->
  <rect x="80" y="148" width="100" height="100" rx="24" fill="url(#logoGrad)" filter="url(#shadow)"/>
  <!-- House icon (original 32×32 path scaled ×3.1 and offset to center in the 100×100 box) -->
  <g transform="translate(80,148) scale(3.125)">
    <path stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.3" fill="none"
      d="M4 16l2-2m0 0l10-10 10 10M6 14v14a1 1 0 001 1h5M26 14v14a1 1 0 01-1 1h-5m-4 0a1 1 0 001-1v-6a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 001 1m-6 0h6"/>
  </g>

  <!-- Brand name -->
  <text x="200" y="215" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="56" fill="white" letter-spacing="-1.5">ToitureVerte</text>

  <!-- Green accent bar -->
  <rect x="80" y="272" width="52" height="5" rx="3" fill="#4ade80"/>

  <!-- Tagline -->
  <text x="80" y="320" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="600" font-size="26" fill="#86efac">Spécialiste Toiture Verte à Bruxelles</text>

  <!-- Sub-tagline -->
  <text x="80" y="360" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="400" font-size="19" fill="#bbf7d0" opacity="0.85">Extensive · Semi-intensive · Jardin sur toiture</text>

  <!-- CTA pill — primary -->
  <rect x="80" y="395" width="216" height="50" rx="25" fill="#22c55e"/>
  <text x="188" y="427" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="700" font-size="17" fill="white" text-anchor="middle">Devis gratuit →</text>

  <!-- CTA pill — secondary (outline) -->
  <rect x="312" y="395" width="274" height="50" rx="25" fill="none" stroke="#4ade80" stroke-width="2.5"/>
  <text x="449" y="427" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="600" font-size="16" fill="#86efac" text-anchor="middle">Prime RENOLUTION jusqu'à 50 €/m²</text>

  <!-- ============================= -->
  <!--  BOTTOM STATS BAR             -->
  <!-- ============================= -->
  <rect x="0" y="530" width="1200" height="100" fill="#052e16" opacity="0.72"/>

  <!-- Stat 1 -->
  <text x="148" y="578" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="34" fill="white" text-anchor="middle">350+</text>
  <text x="148" y="606" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="400" font-size="14" fill="#86efac" text-anchor="middle">projets réalisés</text>

  <rect x="270" y="548" width="2" height="54" rx="1" fill="#4ade80" opacity="0.35"/>

  <!-- Stat 2 -->
  <text x="395" y="578" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="34" fill="white" text-anchor="middle">85 000</text>
  <text x="395" y="606" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="400" font-size="14" fill="#86efac" text-anchor="middle">m² végétalisés</text>

  <rect x="520" y="548" width="2" height="54" rx="1" fill="#4ade80" opacity="0.35"/>

  <!-- Stat 3 -->
  <text x="640" y="578" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="34" fill="white" text-anchor="middle">10+</text>
  <text x="640" y="606" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="400" font-size="14" fill="#86efac" text-anchor="middle">ans d'expérience</text>

  <rect x="760" y="548" width="2" height="54" rx="1" fill="#4ade80" opacity="0.35"/>

  <!-- Stat 4 -->
  <text x="890" y="578" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="34" fill="white" text-anchor="middle">TVA 6%</text>
  <text x="890" y="606" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="400" font-size="14" fill="#86efac" text-anchor="middle">&amp; primes cumulables</text>

  <rect x="1030" y="548" width="2" height="54" rx="1" fill="#4ade80" opacity="0.35"/>

  <!-- Domain -->
  <text x="1120" y="572" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="600" font-size="15" fill="#4ade80" text-anchor="middle">toitureverte.be</text>
  <text x="1120" y="593" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="400" font-size="13" fill="#86efac" text-anchor="middle">Bruxelles · Belgique</text>
</svg>
