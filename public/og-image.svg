<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#14532d"/>
      <stop offset="100%" stop-color="#1a6138"/>
    </linearGradient>
    <!-- Subtle light wash top-left -->
    <radialGradient id="glow1" cx="15%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <!-- Building drop shadow -->
    <filter id="bldShadow" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#031a0e" flood-opacity="0.55"/>
    </filter>
    <!-- Soft glow for logo box -->
    <filter id="logoShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.30"/>
    </filter>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <!-- Window gradient (gives glassy feel) -->
    <linearGradient id="winGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <!-- Roof substrate -->
    <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4d7c0f"/>
      <stop offset="100%" stop-color="#365314"/>
    </linearGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>

  <!-- Subtle grid texture (horizontal rules) -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-width="0.5" opacity="0.04"/>

  <!-- Divider line between left content and right illustration -->
  <line x1="620" y1="60" x2="620" y2="510" stroke="#4ade80" stroke-width="1" opacity="0.18"/>


  <!-- ═══════════════════════════════════════════════ -->
  <!--  BUILDING — white/light facade, clear contrast  -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Building body (off-white) -->
  <rect x="680" y="240" width="420" height="280" rx="10"
        fill="#f1f5f9" filter="url(#bldShadow)"/>

  <!-- Subtle facade texture: vertical centre line -->
  <line x1="890" y1="240" x2="890" y2="520" stroke="#cbd5e1" stroke-width="1" opacity="0.6"/>

  <!-- Windows row 1 — left half -->
  <rect x="705" y="265" width="68" height="52" rx="6" fill="url(#winGrad)"/>
  <rect x="705" y="265" width="68" height="8"  rx="4" fill="#0ea5e9" opacity="0.25"/>
  <rect x="793" y="265" width="68" height="52" rx="6" fill="url(#winGrad)"/>
  <rect x="793" y="265" width="68" height="8"  rx="4" fill="#0ea5e9" opacity="0.25"/>

  <!-- Windows row 1 — right half -->
  <rect x="910" y="265" width="68" height="52" rx="6" fill="url(#winGrad)"/>
  <rect x="910" y="265" width="68" height="8"  rx="4" fill="#0ea5e9" opacity="0.25"/>
  <rect x="998" y="265" width="68" height="52" rx="6" fill="url(#winGrad)"/>
  <rect x="998" y="265" width="68" height="8"  rx="4" fill="#0ea5e9" opacity="0.25"/>

  <!-- Windows row 2 — left half -->
  <rect x="705" y="340" width="68" height="52" rx="6" fill="url(#winGrad)"/>
  <rect x="705" y="340" width="68" height="8"  rx="4" fill="#0ea5e9" opacity="0.25"/>
  <rect x="793" y="340" width="68" height="52" rx="6" fill="url(#winGrad)"/>
  <rect x="793" y="340" width="68" height="8"  rx="4" fill="#0ea5e9" opacity="0.25"/>

  <!-- Windows row 2 — right half -->
  <rect x="910" y="340" width="68" height="52" rx="6" fill="url(#winGrad)"/>
  <rect x="910" y="340" width="68" height="8"  rx="4" fill="#0ea5e9" opacity="0.25"/>
  <rect x="998" y="340" width="68" height="52" rx="6" fill="url(#winGrad)"/>
  <rect x="998" y="340" width="68" height="8"  rx="4" fill="#0ea5e9" opacity="0.25"/>

  <!-- Door -->
  <rect x="860" y="420" width="60" height="100" rx="5" fill="#94a3b8"/>
  <rect x="862" y="422" width="24" height="46"  rx="3" fill="#bfdbfe" opacity="0.6"/>
  <!-- Door handle -->
  <circle cx="914" cy="472" r="4" fill="#64748b"/>

  <!-- Ground line under building -->
  <rect x="660" y="520" width="460" height="6" rx="3" fill="#15803d" opacity="0.55"/>


  <!-- ═══════════════════════════════════════════════ -->
  <!--  GREEN ROOF — sits clearly on top of the white  -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Roof parapet / edge -->
  <rect x="668" y="196" width="444" height="52" rx="10" fill="url(#roofGrad)"/>
  <!-- Drain/retention layer line -->
  <rect x="668" y="236" width="444" height="8" rx="0" fill="#1a3a0a" opacity="0.5"/>
  <!-- Top cap edge (dark) -->
  <rect x="668" y="196" width="444" height="10" rx="10" fill="#2d4a0e" opacity="0.6"/>

  <!-- ── Plants (green on the roof, clearly distinct from white walls) ── -->

  <!-- Sedum ground cover base -->
  <ellipse cx="890" cy="220" rx="200" ry="12" fill="#4d7c0f" opacity="0.45"/>

  <!-- Plant cluster 1 -->
  <ellipse cx="720" cy="195" rx="24" ry="28" fill="#166534"/>
  <ellipse cx="720" cy="193" rx="16" ry="20" fill="#16a34a"/>
  <ellipse cx="720" cy="191" rx="9"  ry="12" fill="#4ade80"/>

  <!-- Plant cluster 2 -->
  <ellipse cx="775" cy="188" rx="20" ry="25" fill="#15803d"/>
  <ellipse cx="775" cy="186" rx="13" ry="17" fill="#22c55e"/>
  <ellipse cx="775" cy="185" rx="7"  ry="10" fill="#86efac"/>

  <!-- Plant cluster 3 — tallest, hero -->
  <ellipse cx="835" cy="180" rx="30" ry="36" fill="#14532d"/>
  <ellipse cx="835" cy="178" rx="21" ry="26" fill="#166534"/>
  <ellipse cx="835" cy="176" rx="13" ry="17" fill="#22c55e"/>
  <ellipse cx="835" cy="174" rx="6"  ry="9"  fill="#86efac"/>

  <!-- Plant cluster 4 -->
  <ellipse cx="893" cy="186" rx="23" ry="27" fill="#15803d"/>
  <ellipse cx="893" cy="184" rx="15" ry="19" fill="#22c55e"/>
  <ellipse cx="893" cy="183" rx="7"  ry="10" fill="#4ade80"/>

  <!-- Plant cluster 5 -->
  <ellipse cx="950" cy="183" rx="26" ry="30" fill="#166534"/>
  <ellipse cx="950" cy="181" rx="17" ry="21" fill="#16a34a"/>
  <ellipse cx="950" cy="179" rx="9"  ry="12" fill="#4ade80"/>

  <!-- Plant cluster 6 -->
  <ellipse cx="1007" cy="190" rx="20" ry="24" fill="#15803d"/>
  <ellipse cx="1007" cy="188" rx="13" ry="16" fill="#22c55e"/>
  <ellipse cx="1007" cy="187" rx="6"  ry="8"  fill="#86efac"/>

  <!-- Plant cluster 7 (edge) -->
  <ellipse cx="1058" cy="194" rx="18" ry="22" fill="#166534"/>
  <ellipse cx="1058" cy="193" rx="11" ry="14" fill="#16a34a"/>
  <ellipse cx="1058" cy="192" rx="5"  ry="7"  fill="#4ade80"/>

  <!-- Small sedums scattered -->
  <ellipse cx="748" cy="214" rx="11" ry="6" fill="#4ade80" opacity="0.6"/>
  <ellipse cx="810" cy="216" rx="9"  ry="5" fill="#22c55e" opacity="0.55"/>
  <ellipse cx="868" cy="213" rx="12" ry="7" fill="#4ade80" opacity="0.5"/>
  <ellipse cx="923" cy="215" rx="10" ry="6" fill="#22c55e" opacity="0.5"/>
  <ellipse cx="978" cy="214" rx="11" ry="6" fill="#86efac" opacity="0.45"/>
  <ellipse cx="1033" cy="215" rx="9"  ry="5" fill="#4ade80" opacity="0.5"/>


  <!-- ═══════════════════════════════════════════════ -->
  <!--  EVAPOTRANSPIRATION — thin blue wavy lines      -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Line 1 — from cluster 1 (x≈720) -->
  <path d="M 718 162 C 711 140 727 122 720 100 C 713 82 726 68 720 52"
        stroke="#7dd3fc" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.70"/>

  <!-- Line 2 — from cluster 2 (x≈775) -->
  <path d="M 774 160 C 781 138 766 120 774 98 C 782 80 768 66 774 50"
        stroke="#7dd3fc" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.60"/>

  <!-- Line 3 — from cluster 3/tallest (x≈835) -->
  <path d="M 834 138 C 824 114 846 95 835 72 C 824 53 842 40 835 24"
        stroke="#93c5fd" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.75"/>

  <!-- Line 4 — from cluster 4 (x≈893) -->
  <path d="M 892 155 C 900 132 882 114 892 92 C 902 74 886 60 892 44"
        stroke="#7dd3fc" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.60"/>

  <!-- Line 5 — from cluster 5 (x≈950) -->
  <path d="M 949 148 C 941 126 958 108 950 86 C 942 68 956 54 950 38"
        stroke="#93c5fd" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.65"/>

  <!-- Line 6 — from cluster 6 (x≈1007) -->
  <path d="M 1006 162 C 1014 140 998 122 1006 100 C 1014 82 1002 68 1007 52"
        stroke="#7dd3fc" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.52"/>

  <!-- Arrow tips on top of each line (small upward chevrons) -->
  <path d="M 716 56 L 720 48 L 724 56" stroke="#7dd3fc" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.65"/>
  <path d="M 771 54 L 775 46 L 779 54" stroke="#7dd3fc" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M 831 28 L 835 20 L 839 28" stroke="#93c5fd" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.70"/>
  <path d="M 889 48 L 893 40 L 897 48" stroke="#7dd3fc" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M 946 42 L 950 34 L 954 42" stroke="#93c5fd" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.60"/>
  <path d="M 1003 56 L 1007 48 L 1011 56" stroke="#7dd3fc" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.48"/>

  <!-- Small label "évapotranspiration" -->
  <text x="862" y="14"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="11" fill="#7dd3fc" text-anchor="middle" opacity="0.60" letter-spacing="1.5">ÉVAPOTRANSPIRATION</text>


  <!-- ── Sun ── -->
  <circle cx="1130" cy="80" r="38" fill="#fbbf24" opacity="0.88"/>
  <circle cx="1130" cy="80" r="52" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.28"/>
  <circle cx="1130" cy="80" r="66" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.14"/>


  <!-- ═══════════════════════════════════════════════ -->
  <!--  LEFT — BRANDING                               -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Logo rounded square -->
  <rect x="72" y="145" width="100" height="100" rx="22" fill="url(#logoGrad)" filter="url(#logoShadow)"/>
  <!-- House icon -->
  <g transform="translate(72,145) scale(3.125)">
    <path stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.3" fill="none"
      d="M4 16l2-2m0 0l10-10 10 10M6 14v14a1 1 0 001 1h5M26 14v14a1 1 0 01-1 1h-5m-4 0a1 1 0 001-1v-6a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 001 1m-6 0h6"/>
  </g>

  <!-- Brand name -->
  <text x="192" y="214"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="54" fill="white" letter-spacing="-1">ToitureVerte</text>

  <!-- Green accent bar -->
  <rect x="72" y="268" width="50" height="4" rx="2" fill="#4ade80"/>

  <!-- Tagline -->
  <text x="72" y="316"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="600" font-size="25" fill="#bbf7d0">Spécialiste Toiture Verte à Bruxelles</text>

  <!-- Sub-tagline -->
  <text x="72" y="354"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="400" font-size="18" fill="#86efac" opacity="0.80">Extensive · Semi-intensive · Jardin sur toiture</text>

  <!-- CTA pill — primary -->
  <rect x="72" y="388" width="210" height="48" rx="24" fill="#22c55e"/>
  <text x="177" y="419"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="700" font-size="16" fill="white" text-anchor="middle">Devis gratuit →</text>

  <!-- CTA pill — secondary (outline) -->
  <rect x="298" y="388" width="284" height="48" rx="24" fill="none" stroke="#4ade80" stroke-width="2"/>
  <text x="440" y="419"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="600" font-size="15" fill="#86efac" text-anchor="middle">Prime RENOLUTION jusqu'à 50 €/m²</text>


  <!-- ═══════════════════════════════════════════════ -->
  <!--  BOTTOM STATS BAR                              -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="0" y="530" width="1200" height="100" fill="#031a0e" opacity="0.75"/>

  <!-- Stat 1 -->
  <text x="145" y="576"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="32" fill="white" text-anchor="middle">350+</text>
  <text x="145" y="604"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="400" font-size="13" fill="#86efac" text-anchor="middle">projets réalisés</text>

  <line x1="268" y1="548" x2="268" y2="602" stroke="#4ade80" stroke-width="1" opacity="0.30"/>

  <!-- Stat 2 -->
  <text x="390" y="576"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="32" fill="white" text-anchor="middle">85 000 m²</text>
  <text x="390" y="604"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="400" font-size="13" fill="#86efac" text-anchor="middle">végétalisés</text>

  <line x1="520" y1="548" x2="520" y2="602" stroke="#4ade80" stroke-width="1" opacity="0.30"/>

  <!-- Stat 3 -->
  <text x="630" y="576"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="32" fill="white" text-anchor="middle">10+</text>
  <text x="630" y="604"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="400" font-size="13" fill="#86efac" text-anchor="middle">ans d'expérience</text>

  <line x1="750" y1="548" x2="750" y2="602" stroke="#4ade80" stroke-width="1" opacity="0.30"/>

  <!-- Stat 4 -->
  <text x="878" y="576"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="32" fill="white" text-anchor="middle">TVA 6%</text>
  <text x="878" y="604"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="400" font-size="13" fill="#86efac" text-anchor="middle">&amp; primes cumulables</text>

  <line x1="1018" y1="548" x2="1018" y2="602" stroke="#4ade80" stroke-width="1" opacity="0.30"/>

  <!-- Domain -->
  <text x="1115" y="572"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="600" font-size="15" fill="#4ade80" text-anchor="middle">toitureverte.be</text>
  <text x="1115" y="592"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="400" font-size="12" fill="#86efac" text-anchor="middle">Bruxelles · Belgique</text>

</svg>
